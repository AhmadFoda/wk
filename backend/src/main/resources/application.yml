spring:
  application.name: backend
  datasource:
    url: jdbc:h2:file:/data/credreg;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: ahmed
    password:
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  sql:
    init:
      mode: always
server:
  port: 8080


